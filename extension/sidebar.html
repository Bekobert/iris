<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iris</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f11;
      color: #e8e8ec;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }

    #snapBtn {
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #snapBtn:hover { background: #5a52e0; }
    #snapBtn:active { background: #4a43cc; }

    #app {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 16px;
    }

    /* States */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 260px;
      gap: 10px;
      text-align: center;
    }
    .state-icon { font-size: 36px; }
    .state-title { font-size: 15px; font-weight: 500; color: #fff; }
    .state-sub { font-size: 13px; color: #888; line-height: 1.5; }

    /* Spinner */
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results-header {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    .product-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .product-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      position: relative;
      transition: background 0.12s;
    }
    .product-card:hover { background: rgba(255,255,255,0.07); }

    .product-img {
      width: 52px; height: 52px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
      background: #1e1e24;
    }

    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 13px;
      font-weight: 500;
      color: #e8e8ec;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-store { font-size: 11px; color: #888; margin-top: 2px; }
    .product-price { font-size: 12px; color: #a78bfa; margin-top: 3px; font-weight: 500; }
    .no-price { color: #555; }

    .score-badge {
      font-size: 10px;
      background: rgba(108,99,255,0.2);
      color: #a78bfa;
      padding: 2px 6px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .save-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 2px 4px;
      line-height: 1;
      transition: color 0.12s;
    }
    .save-btn:hover { color: #e879a0; }
    .save-btn.saved { color: #e879a0; }
    .save-btn:disabled { opacity: 0.4; }

    .query-id {
      font-size: 10px;
      color: #333;
      margin-top: 12px;
      text-align: right;
    }

    /* Toast */
    #iris-toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 9999;
    }
    .toast-info    { background: #1e1e2e; color: #a78bfa; border: 1px solid #a78bfa44; }
    .toast-warn    { background: #2a1f00; color: #fbbf24; border: 1px solid #fbbf2444; }
    .toast-error   { background: #2a0a0a; color: #f87171; border: 1px solid #f8717144; }
  </style>
</head>
<body>
  <header>
    <span class="logo">iris</span>
    <button id="snapBtn">Snap</button>
  </header>
  <div id="app"></div>
  <script src="sidebar.js"></script>
</body>
</html>

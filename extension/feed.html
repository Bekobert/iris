<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iris — Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f11; color: #e8e8ec; min-height: 100vh; }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,17,0.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .logo { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; color: #fff; }
    .nav-links { display: flex; gap: 6px; }
    .nav-link {
      font-size: 12px; padding: 5px 12px; border-radius: 7px;
      color: #888; text-decoration: none; border: 1px solid transparent; transition: all 0.12s;
    }
    .nav-link:hover { color: #e8e8ec; background: rgba(255,255,255,0.06); }
    .nav-link.active { color: #a78bfa; background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.25); }
    .ultra-gate {
      margin: 40px auto; max-width: 400px; text-align: center; padding: 40px 24px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
    }
    .gate-icon { font-size: 40px; margin-bottom: 16px; }
    .gate-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .gate-sub { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .btn-upgrade {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: #fff; border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .feed-layout { display: grid; grid-template-columns: 1fr 280px; gap: 0; max-width: 960px; margin: 0 auto; padding: 24px; }
    .feed-col { display: flex; flex-direction: column; gap: 16px; }
    .outfit-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; overflow: hidden;
    }
    .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(108,99,255,0.25); display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 600; color: #a78bfa; flex-shrink: 0;
    }
    .card-user-info { flex: 1; }
    .card-username { font-size: 12px; font-weight: 600; color: #ddd; }
    .card-time { font-size: 10px; color: #555; }
    .outfit-slots {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 14px;
    }
    .feed-slot {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px; padding: 8px;
      display: flex; align-items: center; gap: 7px;
    }
    .feed-slot.wide { grid-column: span 2; }
    .feed-slot-img {
      width: 30px; height: 36px; border-radius: 4px;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; overflow: hidden;
    }
    .feed-slot-img img { width: 100%; height: 100%; object-fit: cover; }
    .feed-slot-name { font-size: 10px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-slot-price { font-size: 10px; color: #a78bfa; margin-top: 1px; }
    .card-footer { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .ftag {
      font-size: 10px; padding: 2px 8px; border-radius: 99px;
      background: rgba(108,99,255,0.12); color: #a78bfa;
      border: 1px solid rgba(108,99,255,0.2);
    }
    .card-actions { display: flex; gap: 10px; align-items: center; }
    .action-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; color: #666; display: flex; align-items: center; gap: 4px;
      transition: color 0.12s; padding: 4px;
    }
    .action-btn:hover { color: #a78bfa; }
    .action-btn.liked { color: #f87171; }
    .card-total { font-size: 11px; color: #555; }
    .card-total strong { color: #a78bfa; }
    .sidebar-col { display: flex; flex-direction: column; gap: 14px; padding-left: 20px; }
    .sidebar-widget {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 14px;
    }
    .widget-title { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
    .trending-tag {
      display: inline-flex; margin: 3px;
      font-size: 11px; padding: 4px 10px; border-radius: 99px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: #888; cursor: pointer; transition: all 0.1s;
    }
    .trending-tag:hover { color: #a78bfa; border-color: rgba(108,99,255,0.3); }
    .suggest-user { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .suggest-user:last-child { border: none; }
    .suggest-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(108,99,255,0.2); display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 600; color: #a78bfa;
    }
    .suggest-info { flex: 1; }
    .suggest-name { font-size: 11px; font-weight: 500; color: #ddd; }
    .suggest-followers { font-size: 10px; color: #555; }
    .follow-btn {
      font-size: 10px; padding: 3px 10px; border-radius: 99px;
      border: 1px solid rgba(108,99,255,0.3); background: rgba(108,99,255,0.1);
      color: #a78bfa; cursor: pointer; transition: all 0.1s;
    }
    .follow-btn:hover { background: rgba(108,99,255,0.25); }
    .ultra-pill {
      display: inline-flex; align-items: center; gap: 3px; font-size: 10px;
      padding: 3px 8px; border-radius: 99px;
      background: rgba(167,139,250,0.12); color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.25);
    }
  </style>
</head>
<body>

<header>
  <span class="logo">iris</span>
  <nav class="nav-links">
    <a class="nav-link" href="collection.html">collection</a>
    <a class="nav-link" href="studio.html">studio</a>
    <a class="nav-link active" href="feed.html">feed</a>
    <a class="nav-link" href="profile.html">profile</a>
  </nav>
  <div></div>
</header>

<div id="app"></div>

<script>
const MOCK_OUTFITS = [
  {
    id: 1, user: 'ayse.k', initials: 'AK', time: '2h ago',
    name: 'monday mood', tags: ['minimal', 'office'],
    total: 3047,
    slots: {
      top: { name: 'Fitted Knit', price: 799, emoji: '&#128085;' },
      outer: null,
      bottom: { name: 'Straight Jeans', price: 1199, emoji: '&#128086;' },
      shoes: { name: 'Loafer', price: 1290, emoji: '&#128094;' },
      bag: { name: 'Mini Bag', price: 1599, emoji: '&#128092;' },
    },
    likes: 24, liked: false, saves: 8,
  },
  {
    id: 2, user: 'zeynep.m', initials: 'ZM', time: '5h ago',
    name: 'weekend streetwear', tags: ['streetwear', 'casual'],
    total: 4537,
    slots: {
      top: { name: 'Oversize T-Shirt', price: 349, emoji: '&#128085;' },
      outer: { name: 'Denim Jacket', price: 899, emoji: '&#129441;' },
      bottom: { name: 'Wide Leg Pants', price: 599, emoji: '&#128086;' },
      shoes: { name: 'Chunky Sneaker', price: 2490, emoji: '&#128094;' },
      bag: { name: 'Scarf', price: 399, emoji: '&#129485;' },
    },
    likes: 61, liked: false, saves: 17,
  },
  {
    id: 3, user: 'elif.t', initials: 'ET', time: '1d ago',
    name: 'trench season', tags: ['minimal', 'Y2K'],
    total: 3747,
    slots: {
      top: { name: 'Crop Blouse', price: 499, emoji: '&#128085;' },
      outer: { name: 'Trench Coat', price: 1299, emoji: '&#129441;' },
      bottom: { name: 'Mini Skirt', price: 449, emoji: '&#128086;' },
      shoes: { name: 'Platform Boot', price: 1890, emoji: '&#128094;' },
      bag: null,
    },
    likes: 103, liked: false, saves: 34,
  },
];

const TRENDING = ['minimal', 'streetwear', 'Y2K', 'office', 'casual', 'sport', 'monochrome', 'coastal'];
const SUGGESTS = [
  { initials: 'SB', name: 'selin.b', followers: '2.4k followers' },
  { initials: 'NA', name: 'naz.a', followers: '891 followers' },
  { initials: 'DK', name: 'defne.k', followers: '5.1k followers' },
];

const isUltra = false;

const slotOrder = ['top', 'outer', 'bottom', 'shoes', 'bag'];

function renderSlots(slots) {
  return slotOrder.map(k => {
    const p = slots[k];
    const wide = k === 'bag' ? ' wide' : '';
    if (!p) return '';
    return `<div class="feed-slot${wide}">
      <div class="feed-slot-img">${p.emoji || '&#128092;'}</div>
      <div>
        <div class="feed-slot-name">${p.name}</div>
        <div class="feed-slot-price">&#8378;${Number(p.price).toLocaleString('tr-TR')}</div>
      </div>
    </div>`;
  }).join('');
}

function renderFeed() {
  return MOCK_OUTFITS.map((o, i) => `
    <div class="outfit-card" id="card-${o.id}">
      <div class="card-header">
        <div class="avatar">${o.initials}</div>
        <div class="card-user-info">
          <div class="card-username">@${o.user}</div>
          <div class="card-time">${o.time}</div>
        </div>
        <span style="font-size:13px;font-weight:600;color:#ddd">${o.name}</span>
      </div>
      <div class="outfit-slots">${renderSlots(o.slots)}</div>
      <div class="card-footer">
        <div class="card-tags">${o.tags.map(t => `<span class="ftag">${t}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="action-btn${o.liked ? ' liked' : ''}" onclick="toggleLike(${o.id})">
            ${o.liked ? '&#9829;' : '&#9825;'} <span id="likes-${o.id}">${o.likes}</span>
          </button>
          <button class="action-btn" onclick="saveOutfit(${o.id})" title="save">&#128278; <span>${o.saves}</span></button>
        </div>
      </div>
      <div style="padding:0 14px 12px"><div class="card-total">total: <strong>&#8378;${o.total.toLocaleString('tr-TR')}</strong></div></div>
    </div>
  `).join('');
}

function renderSidebar() {
  return `
    <div class="sidebar-widget">
      <div class="widget-title">trending tags</div>
      <div>${TRENDING.map(t => `<span class="trending-tag">#${t}</span>`).join('')}</div>
    </div>
    <div class="sidebar-widget">
      <div class="widget-title">suggested creators</div>
      ${SUGGESTS.map(u => `
        <div class="suggest-user">
          <div class="suggest-avatar">${u.initials}</div>
          <div class="suggest-info">
            <div class="suggest-name">@${u.name}</div>
            <div class="suggest-followers">${u.followers}</div>
          </div>
          <button class="follow-btn" onclick="this.textContent='following'; this.style.opacity='0.5'; this.disabled=true;">follow</button>
        </div>
      `).join('')}
    </div>
    <div class="sidebar-widget">
      <div class="widget-title">your outfits</div>
      <div style="font-size:11px;color:#555;line-height:1.6">publishing requires <span class="ultra-pill">&#9812; ultra</span><br/>upgrade to share your combinations.</div>
    </div>
  `;
}

if (!isUltra) {
  document.getElementById('app').innerHTML = `
    <div class="feed-layout">
      <div class="feed-col">
        <div style="background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:#a78bfa;display:flex;align-items:center;gap:8px;">
          &#9812; You're viewing the feed as a guest. <a href="#" style="color:#a78bfa;margin-left:auto;font-weight:600">upgrade to ultra &rarr;</a>
        </div>
        ${renderFeed()}
      </div>
      <div class="sidebar-col">${renderSidebar()}</div>
    </div>
  `;
} else {
  document.getElementById('app').innerHTML = `
    <div class="feed-layout">
      <div class="feed-col">${renderFeed()}</div>
      <div class="sidebar-col">${renderSidebar()}</div>
    </div>
  `;
}

function toggleLike(id) {
  const o = MOCK_OUTFITS.find(x => x.id === id);
  if (!o) return;
  o.liked = !o.liked;
  o.likes += o.liked ? 1 : -1;
  const btn = document.querySelector(`#card-${id} .action-btn`);
  if (btn) {
    btn.classList.toggle('liked', o.liked);
    btn.innerHTML = `${o.liked ? '&#9829;' : '&#9825;'} <span id="likes-${id}">${o.likes}</span>`;
  }
}

function saveOutfit(id) {
  alert('Saved to your collection!');
}
</script>
</body>
</html>

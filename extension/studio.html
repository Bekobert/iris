<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iris — Outfit Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f11; color: #e8e8ec; min-height: 100vh; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,17,0.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .logo { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; color: #fff; }
    .nav-links { display: flex; gap: 6px; }
    .nav-link {
      font-size: 12px; padding: 5px 12px; border-radius: 7px;
      color: #888; text-decoration: none; border: 1px solid transparent;
      transition: all 0.12s; cursor: pointer; background: none;
    }
    .nav-link:hover { color: #e8e8ec; background: rgba(255,255,255,0.06); }
    .nav-link.active { color: #a78bfa; background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.25); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .btn {
      font-size: 12px; padding: 6px 14px; border-radius: 7px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: #ccc; transition: all 0.12s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-primary { background: #6c63ff; border-color: #6c63ff; color: #fff; }
    .btn-primary:hover { background: #7c74ff; }
    .btn-ghost { border-color: transparent; background: transparent; }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); }

    .layout {
      display: grid;
      grid-template-columns: 1fr 220px;
      grid-template-rows: auto 1fr;
      gap: 0;
      height: calc(100vh - 56px);
    }

    /* ── Canvas ── */
    .canvas-panel {
      grid-row: 1 / 3;
      padding: 20px 20px 20px 24px;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto;
    }
    .panel-header { display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 14px; font-weight: 600; color: #e8e8ec; }

    .outfit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .slot {
      background: rgba(255,255,255,0.03);
      border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: 10px;
      min-height: 110px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: border-color 0.12s, background 0.12s;
      padding: 10px;
    }
    .slot:hover, .slot.drag-over {
      border-color: #6c63ff;
      background: rgba(108,99,255,0.07);
    }
    .slot.filled {
      border-style: solid;
      border-color: rgba(255,255,255,0.08);
      align-items: flex-start; justify-content: flex-start;
    }
    .slot.wide { grid-column: span 2; min-height: 80px; }
    .slot-icon { font-size: 24px; margin-bottom: 6px; opacity: 0.3; }
    .slot-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
    .slot-active-hint {
      font-size: 10px; color: #6c63ff;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .product-thumb { display: flex; gap: 10px; align-items: flex-start; width: 100%; }
    .thumb-img {
      width: 48px; height: 60px; border-radius: 6px;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 22px; overflow: hidden;
    }
    .thumb-img img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-info { flex: 1; min-width: 0; }
    .thumb-name { font-size: 11px; font-weight: 500; color: #e8e8ec; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thumb-brand { font-size: 10px; color: #666; margin-top: 2px; }
    .thumb-price { font-size: 11px; font-weight: 600; color: #a78bfa; margin-top: 5px; }
    .remove-btn {
      position: absolute; top: 6px; right: 6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 10px; color: #888;
      transition: background 0.12s, color 0.12s;
    }
    .remove-btn:hover { background: rgba(220,50,50,0.7); color: #fff; }

    /* ── Collection panel ── */
    .collection-panel {
      padding: 16px 20px;
      border-left: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .cat-tabs { display: flex; flex-wrap: wrap; gap: 5px; }
    .cat-tab {
      font-size: 10px; padding: 3px 9px; border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: #666; cursor: pointer; transition: all 0.1s;
    }
    .cat-tab:hover { color: #ccc; }
    .cat-tab.active { background: rgba(108,99,255,0.2); border-color: rgba(108,99,255,0.4); color: #a78bfa; }
    .coll-hint { font-size: 10px; color: #444; }
    .product-list { display: flex; flex-direction: column; gap: 6px; }
    .prod-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 8px;
      border: 1px solid transparent;
      cursor: grab; user-select: none;
      transition: background 0.1s, border-color 0.1s;
      background: rgba(255,255,255,0.03);
    }
    .prod-row:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.08); }
    .prod-row.dragging { opacity: 0.4; }
    .prod-row-img {
      width: 36px; height: 44px; border-radius: 5px;
      background: rgba(255,255,255,0.06);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 18px; overflow: hidden;
    }
    .prod-row-img img { width: 100%; height: 100%; object-fit: cover; }
    .prod-row-info { flex: 1; min-width: 0; }
    .prod-row-name { font-size: 11px; font-weight: 500; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prod-row-meta { font-size: 10px; color: #555; margin-top: 1px; }
    .prod-row-price { font-size: 11px; color: #a78bfa; font-weight: 600; flex-shrink: 0; }

    /* ── Sidebar ── */
    .sidebar-panel {
      padding: 16px 20px;
      border-left: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; gap: 12px;
    }
    .side-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 12px 14px;
    }
    .side-title { font-size: 10px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .total-price { font-size: 26px; font-weight: 700; color: #e8e8ec; }
    .total-sub { font-size: 11px; color: #555; margin-top: 2px; }
    .breakdown { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .brow { display: flex; justify-content: space-between; font-size: 11px; color: #666; }
    .brow span:last-child { color: #a78bfa; font-weight: 500; }
    .name-input {
      width: 100%; font-size: 12px; padding: 6px 10px; border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
      color: #e8e8ec; outline: none;
    }
    .name-input:focus { border-color: #6c63ff; }
    .style-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .stag {
      font-size: 10px; padding: 3px 9px; border-radius: 99px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: #666; cursor: pointer; transition: all 0.1s;
    }
    .stag:hover { color: #ccc; }
    .stag.active { background: rgba(108,99,255,0.2); border-color: rgba(108,99,255,0.35); color: #a78bfa; }
    .ultra-badge {
      display: inline-flex; align-items: center; gap: 3px; font-size: 10px;
      padding: 3px 8px; border-radius: 99px;
      background: rgba(167,139,250,0.12); color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.25); font-weight: 500;
    }
    .hint-pub { font-size: 10px; color: #444; margin-top: 8px; line-height: 1.5; }

    /* ── Preview modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #1a1a1e; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 24px; width: 460px; max-width: 95vw;
    }
    .modal-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .preview-slot {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .preview-slot.empty { opacity: 0.35; }
    .preview-slot.wide { grid-column: span 2; }
    .preview-slot-img {
      width: 36px; height: 44px; border-radius: 5px;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      overflow: hidden; flex-shrink: 0;
    }
    .preview-slot-img img { width: 100%; height: 100%; object-fit: cover; }
    .preview-slot-info { min-width: 0; }
    .preview-slot-name { font-size: 11px; font-weight: 500; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-slot-price { font-size: 10px; color: #a78bfa; margin-top: 2px; }
    .preview-outfit-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .preview-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
    .preview-tag {
      font-size: 10px; padding: 2px 8px; border-radius: 99px;
      background: rgba(108,99,255,0.15); color: #a78bfa;
      border: 1px solid rgba(108,99,255,0.25);
    }
    .preview-total { font-size: 13px; color: #666; margin-bottom: 16px; }
    .preview-total strong { color: #a78bfa; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  </style>
</head>
<body>

<header>
  <span class="logo">iris</span>
  <nav class="nav-links">
    <a class="nav-link" href="collection.html">collection</a>
    <a class="nav-link active" href="studio.html">studio</a>
    <a class="nav-link" href="feed.html">feed</a>
    <a class="nav-link" href="profile.html">profile</a>
  </nav>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="clearAll()">&#x21ba; clear</button>
    <button class="btn btn-primary" onclick="openPreview()">&#x2192; preview</button>
  </div>
</header>

<div class="layout">
  <div class="canvas-panel">
    <div class="panel-header">
      <span class="panel-title">outfit studio</span>
    </div>
    <div class="outfit-grid" id="outfitGrid">
      <div class="slot" id="slot-top" data-slot="top"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event)" onclick="clickSlot('top')">
        <div class="slot-icon">&#128085;</div>
        <span class="slot-label">top</span>
      </div>
      <div class="slot" id="slot-outer" data-slot="outer"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event)" onclick="clickSlot('outer')">
        <div class="slot-icon">&#129441;</div>
        <span class="slot-label">outer</span>
      </div>
      <div class="slot" id="slot-bottom" data-slot="bottom"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event)" onclick="clickSlot('bottom')">
        <div class="slot-icon">&#128072;</div>
        <span class="slot-label">bottom</span>
      </div>
      <div class="slot" id="slot-shoes" data-slot="shoes"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event)" onclick="clickSlot('shoes')">
        <div class="slot-icon">&#128094;</div>
        <span class="slot-label">shoes</span>
      </div>
      <div class="slot wide" id="slot-bag" data-slot="bag"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event)" onclick="clickSlot('bag')">
        <div class="slot-icon">&#128092;</div>
        <span class="slot-label">bag / accessories</span>
      </div>
    </div>
  </div>

  <div class="collection-panel">
    <div class="side-title">your collection</div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="coll-hint" id="collHint">drag to slot &middot; or tap to add</div>
    <div class="product-list" id="productList"></div>
  </div>

  <div class="sidebar-panel">
    <div class="side-card">
      <div class="side-title">total</div>
      <div class="total-price" id="totalPrice">&#8378;0</div>
      <div class="total-sub" id="totalSub">no items selected</div>
      <div class="breakdown" id="breakdown"></div>
    </div>
    <div class="side-card">
      <div class="side-title">outfit name</div>
      <input class="name-input" type="text" placeholder="e.g. office casual" id="outfitName" />
      <div class="style-tags">
        <span class="stag" onclick="this.classList.toggle('active')">minimal</span>
        <span class="stag" onclick="this.classList.toggle('active')">casual</span>
        <span class="stag" onclick="this.classList.toggle('active')">office</span>
        <span class="stag" onclick="this.classList.toggle('active')">streetwear</span>
        <span class="stag" onclick="this.classList.toggle('active')">Y2K</span>
        <span class="stag" onclick="this.classList.toggle('active')">sport</span>
      </div>
      <p class="hint-pub">publish requires <span class="ultra-badge">&#9812; ultra</span></p>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-backdrop" id="previewModal">
  <div class="modal">
    <div class="modal-title">outfit preview</div>
    <div class="preview-outfit-name" id="prevName"></div>
    <div class="preview-tags" id="prevTags"></div>
    <div class="preview-grid" id="prevGrid"></div>
    <div class="preview-total" id="prevTotal"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closePreview()">close</button>
      <button class="btn btn-primary" onclick="saveOutfit()">&#x2713; save outfit</button>
    </div>
  </div>
</div>

<script src="studio.js"></script>
</body>
</html>
